<style>
:root{
  --bleu:#1B4F8A;
  --vert:#2E8B6A;
  --fond:#FAFAFA;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{
  font-family:'Inter',sans-serif;
  background:var(--fond);
  color:#1a1a1a;
}
body[dir="rtl"]{font-family:'Tajawal',sans-serif;}
.barre-haut{
  position:fixed;top:0;left:0;height:4px;
  background:linear-gradient(90deg,var(--bleu),var(--vert));
  width:0%;transition:width .4s ease;z-index:1000;
}
header{
  position:fixed;top:4px;left:0;right:0;
  background:var(--bleu);color:#fff;padding:14px 20px;
  display:flex;justify-content:space-between;align-items:center;z-index:999;
  box-shadow:0 2px 6px rgba(0,0,0,.15);
}
header h1{margin:0;font-size:16px;font-weight:600;}
.btn-lang{
  background:#fff;color:var(--bleu);border:none;border-radius:6px;
  padding:6px 14px;font-weight:700;cursor:pointer;font-size:13px;
}
main{max-width:720px;margin:0 auto;padding:78px 16px 50px;}
.page{display:none;}
.page.actif{display:block;animation:apparition .3s ease;}
@keyframes apparition{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.carte{
  background:#fff;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08);
  padding:26px;margin-bottom:16px;
}
.carte h2{color:var(--bleu);margin-top:0;}
.btn-principal{
  display:block;width:100%;background:var(--bleu);color:#fff;border:none;
  border-radius:8px;padding:14px;font-size:16px;font-weight:700;cursor:pointer;
  margin-top:14px;font-family:inherit;
}
.btn-principal:hover{opacity:.9;}
.btn-secondaire{
  display:block;width:100%;background:transparent;color:var(--bleu);
  border:2px solid var(--bleu);border-radius:8px;padding:12px;font-size:15px;
  font-weight:700;cursor:pointer;margin-top:10px;font-family:inherit;
}
.champ{margin-bottom:16px;}
.champ label{display:block;font-weight:600;margin-bottom:6px;font-size:14px;}
.champ select,.champ input[type=text]{
  width:100%;padding:10px;border:1px solid #ccc;border-radius:8px;
  font-size:15px;font-family:inherit;background:#fff;
}
.erreur{color:#c0392b;font-size:13px;margin-top:10px;display:none;font-weight:600;}
.item-bloc{margin-bottom:22px;padding-bottom:18px;border-bottom:1px solid #eee;}
.item-bloc:last-child{border-bottom:none;}
.item-num{color:var(--bleu);font-weight:700;font-size:12px;letter-spacing:.5px;}
.item-texte{font-weight:600;margin:6px 0 12px;font-size:15px;}
.echelle{display:flex;gap:6px;flex-wrap:wrap;}
.opt-label{
  flex:1;min-width:58px;border:1px solid #ccc;border-radius:8px;
  overflow:hidden;cursor:pointer;text-align:center;
}
.opt-label input{position:absolute;opacity:0;width:0;height:0;}
.opt-label span{display:block;padding:9px 4px;font-size:11.5px;font-weight:600;}
.opt-label input:checked + span{background:var(--bleu);color:#fff;}
.opt-label:hover{border-color:var(--bleu);}
.champ select:focus,.champ input[type=text]:focus{outline:2px solid var(--bleu);outline-offset:1px;}
.note-confidentialite{font-size:12px;color:#666;margin-top:18px;line-height:1.5;border-top:1px dashed #ddd;padding-top:12px;}
.pied-page{text-align:center;font-size:12px;color:#999;margin-top:30px;}
.barre-score-conteneur{
  background:#eee;border-radius:20px;height:24px;overflow:hidden;margin:18px 0;
}
.barre-score{
  height:100%;width:0%;
  background:linear-gradient(90deg,var(--bleu),var(--vert));
  border-radius:20px;transition:width 1s ease;
}
.score-total{font-size:40px;font-weight:800;color:var(--bleu);text-align:center;margin:8px 0;}
.interpretation{
  text-align:center;font-size:15px;font-weight:700;padding:14px;
  border-radius:8px;margin:16px 0;
}
.interpretation.faible{background:#fdecea;color:#c0392b;}
.interpretation.modere{background:#fff8e1;color:#b8860b;}
.interpretation.eleve{background:#e8f6ef;color:var(--vert);}
.toast{
  position:fixed;bottom:20px;right:20px;background:var(--vert);color:#fff;
  padding:12px 20px;border-radius:8px;box-shadow:0 2px 10px rgba(0,0,0,.25);
  display:none;z-index:2000;font-size:14px;font-weight:600;max-width:260px;
}
.toast.erreur{background:#c0392b;}
body[dir="rtl"] .toast{right:auto;left:20px;}
@media print{
  header,.barre-haut,.btn-secondaire,#p0,#p1,#p2{display:none !important;}
  main{padding-top:10px;}
}
</style>

// Fonction utilitaire : remplit un <select> en conservant l'index choisi
function remplirSelect(idChamp, options) {
  var select = document.getElementById(idChamp);
  var indexActuel = select.selectedIndex;
  select.innerHTML = "";
  var i;
  for (i = 0; i < options.length; i++) {
    (function (idx) {
      var opt = document.createElement("option");
      opt.value = idx;
      opt.textContent = options[idx];
      select.appendChild(opt);
    })(i);
  }
  if (indexActuel >= 0 && indexActuel < options.length) {
    select.selectedIndex = indexActuel;
  } else {
    select.selectedIndex = -1;
  }
}
 
// 7. Basculer entre français et arabe

  if (lng === "fr") {
    lng = "ar";
  } else {
    lng = "fr";
  }
  var nouvelleDirection = (lng === "ar") ? "rtl" : "ltr";
  document.documentElement.setAttribute("dir", nouvelleDirection);
  document.documentElement.setAttribute("lang", lng);
  document.body.setAttribute("dir", nouvelleDirection);
  appliquer();
}
 
// 8. Validation de la page démographique

    document.getElementById("erreurDemo").style.display = "block";
    return;
  }
  document.getElementById("erreurDemo").style.display = "none";
 
  // Stockage avec libellés français canoniques, indépendants de la langue d'affichage

  demo = {
    age: optAgeFR[parseInt(age, 10)],
    genre: optGenreFR[parseInt(genre, 10)],
    education: optEducationFR[parseInt(education, 10)],
    situation: optSituationFR[parseInt(situation, 10)],
    pays: pays

}
 
// 9. Construction dynamique des 14 items WEMWBS

      var numero = document.createElement("div");
      numero.className = "item-num";
      numero.textContent = (idx + 1) + " / 14";
      bloc.appendChild(numero);
 
      var texte = document.createElement("div");
      texte.className = "item-texte";
      texte.textContent = items[idx];
      bloc.appendChild(texte);
 
      var echelleDiv = document.createElement("div");
      echelleDiv.className = "echelle";
 
      var j;
      for (j = 0; j < 5; j++) {
        (function (val) {
          var label = document.createElement("label");
          label.className = "opt-label";
 
          var input = document.createElement("input");
          input.type = "radio";
          input.name = "item_" + idx;
          input.value = val + 1;
          if (reponses["item_" + idx] === (val + 1)) {
            input.checked = true;
          }
          input.onchange = function () {
            reponses["item_" + idx] = val + 1;
          };
 
          var span = document.createElement("span");
          span.textContent = echelle[val];
 
          label.appendChild(input);
          label.appendChild(span);
          echelleDiv.appendChild(label);
        })(j);
      }
 
      bloc.appendChild(echelleDiv);
      conteneur.appendChild(bloc);
    })(i);
  }
}
 
// 10. Soumission du questionnaire et calcul du score
function soumettre() {
  var i;
  var total = 0;
  var complet = true;
 
  for (i = 0; i < 14; i++) {
    if (reponses["item_" + i] === undefined) {
      complet = false;
    } else {
      total = total + reponses["item_" + i];
    }
  }
 
  if (!complet) {
    document.getElementById("erreurWemwbs").style.display = "block";
    return;
  }
  document.getElementById("erreurWemwbs").style.display = "none";
 
  var interpretationCode;
  var interpretationTexte;
  if (total <= 42) {
    interpretationCode = "faible";
    interpretationTexte = T[lng].interpFaible;
  } else if (total <= 52) {
    interpretationCode = "modere";
    interpretationTexte = T[lng].interpModere;
  } else {
    interpretationCode = "eleve";
    interpretationTexte = T[lng].interpEleve;
  }
 
  document.getElementById("scoreTotal").textContent = T[lng].scoreLabelPrefix + total + " / 70";
  var elInterp = document.getElementById("interpretationTxt");
  elInterp.textContent = interpretationTexte;
  elInterp.className = "interpretation " + interpretationCode;
  document.getElementById("barreScore").style.width = "0%";
 
  allerA(3);
 
  setTimeout(function () {
    var pourcentageScore = (total / 70) * 100;
    document.getElementById("barreScore").style.width = pourcentageScore + "%";
  }, 150);
 
  var duree = Math.round((Date.now() - tDebut) / 1000);
 
  var entree = {
    timestamp: new Date().toISOString(),
    langue: lng,
    age: demo.age,
    genre: demo.genre,
    education: demo.education,
    situation: demo.situation,
    pays: demo.pays,
    score_total: total,
    interpretation: interpretationCode,
    duree_secondes: duree
  };
 
  for (i = 0; i < 14; i++) {
    entree["item_" + (i + 1)] = reponses["item_" + i];
  }
 
  envoyerDonnees(entree);
}
 
// 11. Envoi des données vers Google Sheets via formulaire caché (pas de fetch)
function envoyerDonnees(entree) {
  try {
    var form = document.createElement("form");
    form.method = "POST";
    form.action = SHEETS_URL;
    form.target = "_gs_frame";
    form.style.display = "none";
 
    var cle;
    for (cle in entree) {
      if (entree.hasOwnProperty(cle)) {
        var champCache = document.createElement("input");
        champCache.type = "hidden";
        champCache.name = cle;
        champCache.value = entree[cle];
        form.appendChild(champCache);
      }
    }
 
    document.body.appendChild(form);
    form.submit();
 
    setTimeout(function () {
      if (form.parentNode) {
        form.parentNode.removeChild(form);
      }
    }, 2000);
 
    sauvegarderLocal(entree);
    afficherToast(T[lng].toastOk, "ok");
  } catch (erreur) {
    sauvegarderLocal(entree);
    afficherToast(T[lng].toastErreur, "erreur");
  }
}
 
// 12. Sauvegarde locale de secours (localStorage)
function sauvegarderLocal(entree) {
  try {
    var brut = localStorage.getItem("wemwbs");
    var liste = brut ? JSON.parse(brut) : [];
    liste.push(entree);
    localStorage.setItem("wemwbs", JSON.stringify(liste));
  } catch (erreur) {
    // localStorage indisponible (navigation privée, etc.) — on ignore
  }
}
 
// 13. Affichage d'un message toast temporaire
function afficherToast(msg, cls) {
  var toast = document.getElementById("toast");
  toast.textContent = msg;
  toast.className = "toast" + (cls === "erreur" ? " erreur" : "");
  toast.style.display = "block";
  setTimeout(function () {
    toast.style.display = "none";
  }, 3000);
}
 
// 14. Réinitialisation complète du questionnaire
function resetQ() {
  reponses = {};
  demo = {};
  tDebut = Date.now();
  document.getElementById("age").selectedIndex = -1;
  document.getElementById("genre").selectedIndex = -1;
  document.getElementById("education").selectedIndex = -1;
  document.getElementById("situation").selectedIndex = -1;
  document.getElementById("pays").value = "";
  document.getElementById("erreurDemo").style.display = "none";
  document.getElementById("erreurWemwbs").style.display = "none";
  document.getElementById("itemsConteneur").innerHTML = "";
  document.getElementById("barreScore").style.width = "0%";
  allerA(0);
}
 
// 15. Initialisation de l'interface au chargement de la page
appliquer();
</script>
